[profile.default]
src = "contracts/src"
out = "contracts/out"
libs = ["contracts/lib", "node_modules"]
script = "contracts/script"
test = "contracts/test"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
remappings = [
    "@superfluid-finance/ethereum-contracts/=node_modules/@superfluid-finance/ethereum-contracts/",
    "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/",
    "@openzeppelin-v5/contracts/=node_modules/@openzeppelin/contracts/",
    "forge-std/=contracts/lib/forge-std/src/"
]

[rpc_endpoints]
celo = "https://forno.celo.org"
celo_sepolia = "https://forno.celo-sepolia.celo-testnet.org" 

[etherscan]
celo = { key = "${ETHERSCAN_API_KEY}", url = "https://celo.blockscout.com/api", verifier = "blockscout" }
celo_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://celo-sepolia.blockscout.com/api", verifier = "blockscout" }
